<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: "Segoe UI", sans-serif;
    transition: 0.3s;
}

.container {
    max-width: 600px;
}
</style>

</head>

<body id="body">

<div class="container mt-5">

<h2>⚙ Settings</h2>

<hr>

<h4>👤 Profile</h4>

<input id="username" class="form-control" value="{{ user.username }}">
<input id="email" class="form-control mt-2" value="{{ user.email }}">

<button class="btn btn-primary mt-2" onclick="updateProfile()">
Update
</button>

<hr>

<h4>🌙 Dark Mode</h4>

<button class="btn btn-dark" onclick="toggleDark()">
Toggle Dark Mode
</button>

<hr>

<h4>🔐 Password</h4>

<input id="current" type="password" class="form-control" placeholder="Current Password">
<input id="new" type="password" class="form-control mt-2" placeholder="New Password">
<input id="confirm" type="password" class="form-control mt-2" placeholder="Confirm Password">

<button class="btn btn-success mt-2" onclick="changePassword()">
Change Password
</button>

</div>

<script>

function updateProfile(){
    fetch("/api/update_profile", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            email: document.getElementById("email").value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        alert("Profile Updated");
    });
}

function changePassword(){
    fetch("/api/change_password", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            current_password: document.getElementById("current").value,
            new_password: document.getElementById("new").value,
            confirm_password: document.getElementById("confirm").value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        alert(d.message);
    });
}

function toggleDark(){
    fetch("/api/toggle_dark_mode", {
        method:"POST"
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.dark_mode){
            document.body.style.background="#111";
            document.body.style.color="white";
        }else{
            document.body.style.background="white";
            document.body.style.color="black";
        }
    });
}

</script>

</body>
</html>
