<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Analytics | ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        .stat-card {
            padding: 20px;
            text-align: center;
            border-radius: 15px;
        }

        .number {
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    {% include "navbar.html" %}

    <h3 class="text-center mt-4">📊 Analytics Dashboard</h3>

    <!-- STATS -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card stat-card shadow">
                <h5>🏆 Topper</h5>
                <div class="number text-success">
                    {{ topper_name }}
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card shadow">
                <h5>📊 Class Average</h5>
                <div class="number text-primary">
                    {{ class_average }}
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card stat-card shadow">
                <h5>👨‍🎓 Total Students</h5>
                <div class="number text-danger">
                    {{ students|length }}
                </div>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="card shadow mt-4 p-4">

        <h5 class="text-center">📈 Class Performance Chart</h5>

        <canvas id="marksChart"></canvas>

    </div>

</div>

<script>
const ctx = document.getElementById('marksChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ["Average Marks"],
        datasets: [{
            label: "Class Performance",
            data: [{{ class_average }}],
            backgroundColor: "rgba(54, 162, 235, 0.7)"
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
