<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Marks Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    background: #f4f6f9;
    font-family: "Segoe UI", sans-serif;
}

/* Cards */
.card {
    border-radius: 18px;
    border: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Form elements */
.form-control, .form-select {
    border-radius: 12px;
    padding: 10px;
    border: 1px solid #e5e7eb;
    transition: 0.3s;
}

.form-control:focus, .form-select:focus {
    border-color: #4e73df;
    box-shadow: 0 0 0 0.2rem rgba(78,115,223,0.2);
}

/* Buttons */
.btn-primary {
    border-radius: 12px;
    background: #4e73df;
    border: none;
    font-weight: 600;
    transition: 0.3s;
}

.btn-primary:hover {
    background: #224abe;
    transform: translateY(-2px);
}

/* Table */
.table {
    border-radius: 12px;
    overflow: hidden;
}

.table thead {
    background: linear-gradient(90deg, #4e73df, #224abe);
    color: white;
}

.table tbody tr:hover {
    background: #f1f5ff;
    transition: 0.2s;
}

/* Section title */
h4 {
    font-weight: 700;
    color: #1f2937;
}

</style>

</head>

<body>

<div class="container py-4">

<!-- NAVBAR -->
{% include "navbar.html" %}

<div class="row mt-4">

    <!-- MARK ENTRY FORM -->
    <div class="col-md-4">

        <div class="card p-4">

            <h4 class="text-center mb-3">➕ Add Marks</h4>

            <form method="POST">

                <label class="form-label">Student</label>
                <select name="student_id" class="form-select mb-2" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_number }})</option>
                    {% endfor %}
                </select>

                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control mb-2" required>

                <label class="form-label">Marks</label>
                <input type="number" name="marks" class="form-control mb-3" required>

                <button class="btn btn-primary w-100">
                    Save Marks
                </button>

            </form>

        </div>

    </div>

    <!-- STUDENT LIST -->
    <div class="col-md-8">

        <div class="card p-4">

            <h4 class="text-center mb-3">📊 Students List</h4>

            <div class="table-responsive">

                <table class="table table-bordered text-center align-middle">

                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Roll No</th>
                            <th>Branch</th>
                            <th>Year</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for s in students %}
                        <tr>
                            <td>{{ loop.index }}</td>
                            <td>{{ s.name }}</td>
                            <td>{{ s.roll_number }}</td>
                            <td>{{ s.branch }}</td>
                            <td>{{ s.year }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
