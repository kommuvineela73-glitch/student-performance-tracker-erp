<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

{% include "navbar.html" %}

<h3 class="text-center mb-4">📊 Student Reports</h3>

<table class="table table-bordered text-center">

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Roll Number</th>
<th>Branch</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for s in students %}
<tr>
<td>{{ loop.index }}</td>
<td>{{ s.name }}</td>
<td>{{ s.roll_number }}</td>
<td>{{ s.branch }}</td>

<td>
<a href="{{ url_for('student_report', student_id=s.id) }}" 
   class="btn btn-primary btn-sm">
   View Report
</a>
</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
