<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>
body{
    background:#eef2f7;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    margin-top:40px;
}

.card-header{
    background:#0d6efd;
    color:white;
    border-radius:20px 20px 0 0 !important;
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn{
    border-radius:10px;
}

#preview{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #0d6efd;
    margin:auto;
    display:block;
}
</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-header text-center">
<h3><i class="fa-solid fa-user-pen"></i> Edit Student</h3>
</div>

<div class="card-body">

<!-- FLASH -->
{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="alert alert-{{category}} alert-dismissible fade show">
{{message}}
<button class="btn-close" data-bs-dismiss="alert"></button>
</div>

{% endfor %}
{% endif %}
{% endwith %}

<!-- ✅ FIXED FORM ACTION -->
<form method="POST"
      enctype="multipart/form-data"
      action="{{ url_for('edit_student', id=student.id) }}">

<!-- PHOTO -->
<div class="text-center mb-4">

{% if student.photo %}
<img id="preview"
     src="{{ url_for('static', filename='uploads/' + student.photo) }}">
{% else %}
<img id="preview" src="https://via.placeholder.com/140">
{% endif %}

</div>

<div class="mb-3">
<label>Student Photo</label>
<input type="file"
       name="photo"
       class="form-control"
       accept="image/*"
       onchange="previewImage(event)">
</div>

<!-- DETAILS -->
<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" name="name" class="form-control"
       value="{{ student.name }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Roll Number</label>
<input type="text" name="roll_number" class="form-control"
       value="{{ student.roll_number }}" required>
</div>

<div class="col-md-4 mb-3">
<label>Branch</label>
<input type="text" name="branch" class="form-control"
       value="{{ student.branch }}">
</div>

<div class="col-md-4 mb-3">
<label>Year</label>
<input type="text" name="year" class="form-control"
       value="{{ student.year }}">
</div>

<div class="col-md-4 mb-3">
<label>Section</label>
<input type="text" name="section" class="form-control"
       value="{{ student.section }}">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control"
       value="{{ student.email }}">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control"
       value="{{ student.phone }}">
</div>

</div>

<!-- BUTTONS -->
<div class="d-grid gap-2">

<button type="submit" class="btn btn-primary">
<i class="fa-solid fa-floppy-disk"></i> Update Student
</button>

<a href="{{ url_for('students') }}" class="btn btn-secondary">
<i class="fa-solid fa-arrow-left"></i> Back
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script>
function previewImage(event){
    let output = document.getElementById("preview");
    output.src = URL.createObjectURL(event.target.files[0]);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
