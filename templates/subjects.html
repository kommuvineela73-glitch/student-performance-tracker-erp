<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subjects | ERP Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            margin-top: 40px;
            border-radius: 15px;
        }

        .table th {
            background: #0d6efd;
            color: white;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">📚 Subjects Management</h3>

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ADD SUBJECT -->
        <form method="POST" action="/subjects" class="d-flex mb-3">
            <input type="text" name="name" class="form-control me-2"
                   placeholder="Enter subject name" required>
            <button class="btn btn-primary">➕ Add Subject</button>
        </form>

        <!-- TABLE -->
        <table class="table table-bordered text-center">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Subject Name</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for s in subjects %}
                <tr>

                    <td>{{ s.id }}</td>

                    <!-- UPDATE FORM -->
                    <td>
                        <form action="/subjects/update/{{ s.id }}" method="POST" class="d-flex">
                            <input type="text" name="name" value="{{ s.name }}"
                                   class="form-control me-2" required>
                            <button class="btn btn-success btn-sm">Update</button>
                        </form>
                    </td>

                    <!-- DELETE -->
                    <td>
                        <a href="/subjects/delete/{{ s.id }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this subject?')">
                            Delete
                        </a>
                    </td>

                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
