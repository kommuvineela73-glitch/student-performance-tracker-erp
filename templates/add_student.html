<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Student | ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
            margin-top: 40px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- NAVBAR (SAFE INCLUDE) -->
    {% if file_exists %}
        {% include "navbar.html" %}
    {% endif %}

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">➕ Add New Student</h3>

                <!-- IMPORTANT FIX: action added -->
                <form method="POST" action="/add">

                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control mb-2" required>

                    <label>Roll Number</label>
                    <input type="text" name="roll_number" class="form-control mb-2" required>

                    <label>Branch</label>
                    <input type="text" name="branch" class="form-control mb-2">

                    <label>Year</label>
                    <input type="text" name="year" class="form-control mb-2">

                    <label>Section</label>
                    <input type="text" name="section" class="form-control mb-2">

                    <label>Email</label>
                    <input type="email" name="email" class="form-control mb-2">

                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control mb-3">

                    <button type="submit" class="btn btn-primary w-100">
                        Add Student
                    </button>

                    <a href="/students" class="btn btn-secondary w-100 mt-2">
                        Back to Students
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
